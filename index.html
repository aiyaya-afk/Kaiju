<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kaiju Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;background:#08081a;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;color:#fff;font-weight:bold;font-size:18px}
body{min-height:100vh}

/* FULL WIDTH BUTTONS */
.btn{display:block;width:100%;padding:18px 16px;font-family:inherit;font-size:22px;cursor:pointer;border:none;color:#fff;margin:6px 0;font-weight:bold;border-radius:10px;text-align:center}
.btn-sm{display:inline-block;width:auto;padding:14px 20px;font-family:inherit;font-size:18px;cursor:pointer;border:none;color:#fff;margin:4px;font-weight:bold;border-radius:10px}
.r{background:#c0392b;box-shadow:0 5px 0 #7b241c}
.b{background:#2471a3;box-shadow:0 5px 0 #1a4971}
.g{background:#1e8449;box-shadow:0 5px 0 #145a32}
.y{background:#b7950b;box-shadow:0 5px 0 #7d6608}
.gr{background:#424949;box-shadow:0 5px 0 #2c3333}
.teal{background:#16a085;box-shadow:0 5px 0 #0e6655}
.btn:active,.btn-sm:active{transform:translateY(4px);box-shadow:none!important}
.btn:disabled,.btn-sm:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.pbox{border:3px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4);padding:14px;border-radius:10px}

/* SPRITES */
.kspr{display:inline-block;border-radius:10px;border:3px solid rgba(255,255,255,.2);image-rendering:pixelated;vertical-align:bottom;background-repeat:no-repeat}
.kspr.flip{transform:scaleX(-1)}
.kspr.shk{animation:shk .4s}.kspr.atkA{animation:atkA .45s}
.kspr.flip.shk{animation:shkF .4s}.kspr.flip.atkA{animation:atkF .45s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
@keyframes shkF{0%,100%{transform:scaleX(-1)}25%{transform:scaleX(-1)translateX(12px)}75%{transform:scaleX(-1)translateX(-12px)}}
@keyframes atkA{0%,100%{transform:translateX(0)scale(1)}50%{transform:translateX(24px)scale(1.18)}}
@keyframes atkF{0%,100%{transform:scaleX(-1)scale(1)}50%{transform:scaleX(-1)translateX(-24px)scale(1.18)}}
@keyframes pop{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* HP BAR */
.hpbar{background:#111;border:3px solid #000;height:18px;border-radius:9px;overflow:hidden;margin-top:4px}
.hpfill{height:100%;transition:width .4s,background .4s;border-radius:9px}

/* BATTLE SCREEN */
.battle-wrap{height:100vh;display:flex;flex-direction:column;padding:10px;background:#0b1020;overflow:hidden}
.arena{position:relative;overflow:hidden;display:flex;justify-content:space-around;align-items:flex-end;padding:12px 8px;flex:1;min-height:0;border:3px solid #1e2040;border-radius:12px;margin-bottom:8px}
.ftr{text-align:center;flex:1}
.fname{font-size:18px;margin-bottom:4px}
.fhp{font-size:15px;color:#aaa;margin-top:3px}

/* BATTLE LOG */
.log{background:#000;border:3px solid #1a1a3a;padding:12px;font-size:18px;color:#2ecc71;line-height:1.5;text-align:center;border-radius:10px;margin-bottom:8px}

/* RAGE */
.rage{font-size:18px;color:#f1c40f;text-align:center;margin:4px 0;animation:bob .8s infinite}

/* HERO SELECT */
.hgrid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:650px;width:100%}
.hcard{background:#111128;border:4px solid #252555;padding:10px;cursor:pointer;text-align:center;width:140px;border-radius:12px;transition:transform .15s,border-color .15s}
.hcard:hover,.hcard:active{transform:translateY(-5px);border-color:#f1c40f}
.hcard.locked{opacity:.3;cursor:not-allowed}
.hcard.locked:hover{transform:none;border-color:#252555}
.hname{font-size:14px;color:#f1c40f;margin-top:4px}
.hhp{font-size:13px;color:#27ae60;margin-top:2px}

/* DEX */
.dgrid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:650px;margin-top:10px;padding-bottom:20px}
.mcard{width:80px;height:80px;border:3px solid #222;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;background:#111128;text-align:center;border-radius:8px}
.mcard.got{border-color:#f1c40f}.mcard.play{border-color:#27ae60}.mcard.no{filter:brightness(.2)}
.mname{font-size:10px;color:#aaa;margin-top:3px;line-height:1.3}

/* QUESTION MODAL - FULL SCREEN */
#qmod{display:none;position:fixed;inset:0;background:#0d0d2e;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#qmod.on{display:flex}
.qbadge{font-size:16px;color:#f1c40f;margin-bottom:12px}
.qremo{font-size:80px;margin-bottom:12px;display:block;text-align:center}
.qtxt{font-size:26px;line-height:1.6;margin-bottom:20px;text-align:center;white-space:pre-line;max-width:420px}
.aopts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px}
.abtn{display:block;width:100%;background:#12122e;border:4px solid #252555;padding:18px 16px;font-family:inherit;font-size:22px;cursor:pointer;color:#fff;font-weight:bold;border-radius:10px;text-align:center}
.abtn:hover,.abtn:active{border-color:#f1c40f;background:#1a1a4a}
.abtn.ok{border-color:#27ae60;background:#081a0f;color:#2ecc71}
.abtn.no{border-color:#e74c3c;background:#1a0808;color:#e74c3c}
.abtn:disabled{cursor:not-allowed}
.qfb{font-size:20px;margin-top:16px;text-align:center;min-height:24px}

/* LOGO */
.logo{font-size:52px;color:#f1c40f;text-shadow:4px 4px 0 #e74c3c,8px 8px 0 #000;line-height:1.2;animation:bob 2s infinite;font-weight:900;letter-spacing:3px;text-align:center}

/* INPUT */
.pixinput{background:#111128;border:4px solid #f1c40f;color:#fff;font-family:inherit;font-size:22px;padding:14px 16px;text-align:center;width:100%;max-width:300px;outline:none;border-radius:10px;font-weight:bold}

/* LOADER */
.loader{width:44px;height:44px;border:5px solid #333;border-top-color:#f1c40f;border-radius:50%;animation:spin 1s linear infinite;margin:16px auto}
.progbar{background:#222;border:3px solid #333;height:18px;width:100%;max-width:280px;margin:10px auto;border-radius:9px;overflow:hidden}
.progfill{height:100%;background:linear-gradient(90deg,#f1c40f,#e74c3c);transition:width .4s;border-radius:9px}

/* ATTACK EFFECTS */
.fx{position:absolute;pointer-events:none}
@keyframes beamAT{0%{transform:scaleX(0);opacity:0}40%{transform:scaleX(1);opacity:1}100%{transform:scaleX(1);opacity:0}}
@keyframes burstFI{0%{transform:translate(-50%,-50%)scale(0);opacity:1}100%{transform:translate(-50%,-50%)scale(3);opacity:0}}
@keyframes ringPH{0%{transform:translate(-50%,-50%)scale(0);opacity:1;border-width:10px}100%{transform:translate(-50%,-50%)scale(2.8);opacity:0;border-width:1px}}
@keyframes sweepFL{0%{transform:translateX(-120%);opacity:0}30%{opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes laserME{0%{transform:scaleX(0);opacity:1}50%{transform:scaleX(1);opacity:1}100%{transform:scaleX(1);opacity:0}}
@keyframes acidTX{0%{height:0;opacity:1}70%{height:65%;opacity:1}100%{height:75%;opacity:0}}
@keyframes tripleRing{0%{transform:translate(-50%,-50%)scale(0);opacity:1}100%{transform:translate(-50%,-50%)scale(3);opacity:0}}
@keyframes flashLI{0%,100%{opacity:0}15%,55%{opacity:.9}35%,75%{opacity:.15}}
@keyframes sshk{0%,100%{transform:none}20%{transform:translateX(-8px)translateY(-4px)}40%{transform:translateX(8px)translateY(4px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.fx-AT{left:8%;top:36%;width:88%;height:20px;background:linear-gradient(90deg,transparent,#3498db,#85c1e9,#fff,#85c1e9,#3498db,transparent);box-shadow:0 0 28px #3498db;animation:beamAT .6s forwards;border-radius:10px;transform-origin:left}
.fx-FI{left:65%;top:10%;width:120px;height:120px;background:radial-gradient(circle,#fff 0%,#f39c12 20%,#e74c3c 55%,transparent 100%);box-shadow:0 0 40px #e74c3c;transform:translate(-50%,-50%);animation:burstFI .65s forwards;border-radius:50%}
.fx-PH{left:58%;top:50%;width:140px;height:140px;border:10px solid rgba(200,200,200,.9);box-shadow:0 0 24px rgba(255,255,255,.5);transform:translate(-50%,-50%);animation:ringPH .55s forwards;border-radius:50%}
.fx-FL{left:0;top:28%;width:100%;height:12px;background:linear-gradient(90deg,transparent,#f1c40f,#fff,#f1c40f,transparent);box-shadow:0 0 18px #f1c40f;animation:sweepFL .5s forwards}
.fx-ME{left:8%;top:47%;width:88%;height:6px;background:linear-gradient(90deg,transparent,#e74c3c,#fff,#e74c3c,transparent);box-shadow:0 0 16px #e74c3c;animation:laserME .45s forwards;transform-origin:left}
.fx-TX{left:62%;top:3%;width:18px;height:0;background:linear-gradient(180deg,#2ecc71,#27ae60,transparent);box-shadow:0 0 14px #2ecc71;animation:acidTX .65s forwards;border-radius:9px}
.fx-EV{left:58%;top:50%;width:130px;height:130px;border:5px solid #9b59b6;box-shadow:0 0 36px #9b59b6;transform:translate(-50%,-50%);animation:tripleRing .55s forwards;border-radius:50%}
.fx-LI{left:0;top:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(241,196,15,.4));animation:flashLI .55s forwards}
.fx-eAT{right:8%;top:36%;width:88%;height:20px;background:linear-gradient(270deg,transparent,#e74c3c,#ec7063,#fff,#ec7063,#e74c3c,transparent);box-shadow:0 0 28px #e74c3c;animation:beamAT .6s forwards;border-radius:10px;transform-origin:right}
.fx-eFI{left:20%;top:10%;width:120px;height:120px;background:radial-gradient(circle,#fff,#e74c3c,#922b21,transparent);box-shadow:0 0 40px #c0392b;transform:translate(-50%,-50%);animation:burstFI .65s forwards;border-radius:50%}
.fx-ePH{left:35%;top:50%;width:140px;height:140px;border:10px solid rgba(200,200,200,.9);box-shadow:0 0 24px rgba(255,255,255,.5);transform:translate(-50%,-50%);animation:ringPH .55s forwards;border-radius:50%}
.fx-eFL{left:0;top:40%;width:100%;height:12px;background:linear-gradient(270deg,transparent,#f1c40f,#fff,#f1c40f,transparent);box-shadow:0 0 18px #f1c40f;animation:sweepFL .5s forwards}
.fx-eME{right:8%;top:47%;width:88%;height:6px;background:linear-gradient(270deg,transparent,#e74c3c,#fff,#e74c3c,transparent);box-shadow:0 0 16px #e74c3c;animation:laserME .45s forwards;transform-origin:right}
.fx-eTX{left:25%;top:3%;width:18px;height:0;background:linear-gradient(180deg,#2ecc71,#27ae60,transparent);box-shadow:0 0 14px #2ecc71;animation:acidTX .65s forwards;border-radius:9px}
.fx-eEV{left:35%;top:50%;width:130px;height:130px;border:5px solid #9b59b6;box-shadow:0 0 36px #9b59b6;transform:translate(-50%,-50%);animation:tripleRing .55s forwards;border-radius:50%}
.fx-eLI{left:0;top:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(241,196,15,.4));animation:flashLI .55s forwards}
.arena.sshk{animation:sshk .4s}
</style>
</head>
<body>
<div id="app"><div class="scr"><div class="logo">KAIJU<br>ACADEMY</div><div class="loader"></div><div style="font-size:18px;color:#aaa;margin-top:10px">Loading...</div><div class="progbar"><div class="progfill" id="loadbar" style="width:0%"></div></div></div></div>
<div id="qmod">
  <div id="qbadge" class="qbadge"></div>
  <div id="qremo" class="qremo" style="display:none"></div>
  <div id="qtxt" class="qtxt"></div>
  <div id="aopts" class="aopts"></div>
  <div id="qfb" class="qfb"></div>
</div>
<script>
// ===== IMAGE CONFIG =====
const ICFG={
  heroes:{url:'https://cdn.jsdelivr.net/gh/aiyaya-afk/Kaiju@main/file_000000009e687207b9b52fd749ffbfb9.png',cols:3,rows:2},
  toho:{url:'https://cdn.jsdelivr.net/gh/aiyaya-afk/Kaiju@main/file_0000000095c471fa90821d97297dc7b6.png',cols:3,rows:3},
  rim:{url:'https://cdn.jsdelivr.net/gh/aiyaya-afk/Kaiju@main/file_00000000690872078f33d1e078c3f866.png',cols:5,rows:2},
  special:{url:'https://cdn.jsdelivr.net/gh/aiyaya-afk/Kaiju@main/file_00000000975c72099012ffca1016bfc2.png',cols:2,rows:2},
};
const IDIM={},LOADED={};let loadedN=0;
function onLoad(){loadedN++;const p=Math.round(loadedN/4*100);const b=$('loadbar');if(b)b.style.width=p+'%';if(loadedN>=4)setTimeout(()=>show(gs.name?'title':'nameInput'),400);}
function preloadImgs(){Object.entries(ICFG).forEach(([k,cfg])=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{IDIM[k]={w:img.naturalWidth,h:img.naturalHeight};LOADED[k]=true;onLoad();};img.onerror=()=>{IDIM[k]={w:cfg.cols*300,h:cfg.rows*300};LOADED[k]=false;onLoad();};setTimeout(()=>{if(!IDIM[k]){IDIM[k]={w:cfg.cols*300,h:cfg.rows*300};LOADED[k]=false;onLoad();}},8000);img.src=cfg.url;});}
const FBGS={AT:'#1a5276',FI:'#922b21',PH:'#4a4a55',FL:'#7a5000',ME:'#2e4060',TX:'#1a6030',EV:'#5b2c8b',LI:'#7a4000'};
function ss(m,z){const cfg=ICFG[m.i],dim=IDIM[m.i];if(!cfg||!dim||!LOADED[m.i])return`width:${z}px;height:${z}px;background:${FBGS[m.t]||'#252555'};font-size:${Math.round(z*.6)}px;line-height:${z}px;border-radius:8px;border:3px solid rgba(255,255,255,.2);`;const cw=dim.w/cfg.cols,ch=dim.h/cfg.rows,sx=z/cw,sy=z/ch;return`background:url('${cfg.url}') ${-(m.c*cw*sx)}px ${-(m.r*ch*sy)}px/${dim.w*sx}px ${dim.h*sy}px;width:${z}px;height:${z}px;image-rendering:pixelated;background-repeat:no-repeat;`;}
function sprHtml(key,z,id='',flip=false){const m=MD[key],idA=id?` id="${id}"`:''
const cls=`kspr${flip?' flip':''}`,style=ss(m,z),inner=(!LOADED[m.i]||!IDIM[m.i])?m.e:'';return`<div${idA} class="${cls}" style="${style}">${inner}</div>`;}
const $=id=>document.getElementById(id);

// ===== MONSTERS =====
const MD={
  GODZILLA:{n:'Godzilla',e:'🦖',i:'heroes',c:0,r:0,t:'AT',hp:120,atk:['⚡ Atomic Breath','💥 Tail Slam','☢️ Nuclear Pulse'],dmg:[25,18,30]},
  MOTHRA:{n:'Mothra',e:'🦋',i:'heroes',c:1,r:0,t:'FL',hp:90,atk:['🌪️ Wing Blast','🕸️ Silk Trap','⚡ Beam Strike'],dmg:[18,14,24],pass:{tp:'hpB',v:8}},
  MECHAG:{n:'MechaGodzilla',e:'🤖',i:'heroes',c:2,r:0,t:'ME',hp:130,atk:['🔴 Laser Beam','🚀 Rocket Fist','🛡️ Shield Bash'],dmg:[26,20,16]},
  JAEGER:{n:'Jaeger',e:'⚙️',i:'heroes',c:0,r:1,t:'ME',hp:125,atk:['🔵 Plasma Cannon','🚀 Elbow Rocket','⚔️ Sword Slash'],dmg:[24,22,20]},
  OTACHI:{n:'Otachi',e:'🐉',i:'heroes',c:1,r:1,t:'TX',hp:100,atk:['🟢 Acid Spit','🦎 Tail Whip','🌀 Wing Dive'],dmg:[26,16,22]},
  KONG:{n:'King Kong',e:'🦍',i:'heroes',c:2,r:1,t:'PH',hp:110,atk:['👊 Ground Pound','💢 Chest Beat','🪨 Boulder Throw'],dmg:[22,18,26]},
  EVOGZ:{n:'Evolved Godzilla',e:'💜',i:'special',c:0,r:0,t:'EV',hp:200,atk:['💜 Purple Beam','🌀 Gravity Crush','✨ Void Nova'],dmg:[45,38,55],bossOnly:true},
  BURNGZ:{n:'Burning Godzilla',e:'🔥',i:'special',c:1,r:0,t:'FI',hp:190,atk:['🔥 Thermal Blast','💥 Meltdown','🌋 Fire Supernova'],dmg:[52,42,62],bossOnly:true},
  ANGUIRUS:{n:'Anguirus',e:'🐢',i:'toho',c:0,r:0,t:'PH',hp:95,atk:['🔄 Roll Attack','🦄 Horn Slam','🦎 Tail Spin'],dmg:[20,18,22],pass:{tp:'healC',v:3}},
  RODAN:{n:'Rodan',e:'🦅',i:'toho',c:1,r:0,t:'FL',hp:85,atk:['💨 Wind Shear','🔊 Sonic Boom','⬇️ Dive Bomb'],dmg:[22,20,26],pass:{tp:'atkB',v:2}},
  GHIDORAH:{n:'King Ghidorah',e:'🐲',i:'toho',c:2,r:0,t:'LI',hp:180,atk:['⚡ Triple Lightning','🌀 Gravity Beam','💀 Annihilator'],dmg:[38,34,44],boss:true,pass:{tp:'starsX',v:1.5}},
  BIOLLANTE:{n:'Biollante',e:'🌿',i:'toho',c:0,r:1,t:'TX',hp:110,atk:['🌿 Vine Whip','🟢 Acid Spray','🌸 Pollen Cloud'],dmg:[24,20,18],pass:{tp:'healC',v:5}},
  GIGAN:{n:'Gigan',e:'⚔️',i:'toho',c:1,r:1,t:'ME',hp:100,atk:['⚙️ Buzzsaw','👁️ Laser Eye','🪝 Hook Slash'],dmg:[26,22,24]},
  HEDORAH:{n:'Hedorah',e:'💀',i:'toho',c:2,r:1,t:'TX',hp:105,atk:['🌧️ Acid Rain','💚 Sludge Bomb','☁️ Smog Cloud'],dmg:[20,24,22],pass:{tp:'eRed',v:2}},
  DESTOROYAH:{n:'Destoroyah',e:'👹',i:'toho',c:0,r:2,t:'FI',hp:160,atk:['💀 O2 Destroyer','🔴 Micro Beam','🦄 Horn Charge'],dmg:[40,34,28],boss:true},
  SPACEGZ:{n:'SpaceGodzilla',e:'⭐',i:'toho',c:1,r:2,t:'AT',hp:165,atk:['🌟 Corona Beam','💎 Crystal Spire','🧠 Telekinesis'],dmg:[38,32,30],boss:true},
  SKULLCRAWLER:{n:'Skullcrawler',e:'🦴',i:'toho',c:2,r:2,t:'PH',hp:80,atk:['🦷 Jaw Slam','🦎 Tail Whip','⬆️ Pounce'],dmg:[20,18,24]},
  TRESPASSER:{n:'Trespasser',e:'🦕',i:'rim',c:0,r:0,t:'PH',hp:90,atk:['🔛 Ram Charge','🦎 Tail Crush','💥 Body Slam'],dmg:[22,18,20]},
  KNIFEHEAD:{n:'Knifehead',e:'🦈',i:'rim',c:1,r:0,t:'PH',hp:85,atk:['⬆️ Head Ram','🦅 Claw Slash','🌊 Deep Dive'],dmg:[24,20,18]},
  OTACHI_W:{n:'Otachi Wild',e:'🐊',i:'rim',c:2,r:0,t:'TX',hp:95,atk:['🟢 Acid Spray','🦎 Tail Whip','🌀 Wing Charge'],dmg:[26,20,22]},
  LEATHERBACK:{n:'Leatherback',e:'🦧',i:'rim',c:3,r:0,t:'ME',hp:115,atk:['⚡ EMP Blast','🦍 Gorilla Slam','🛡️ Shell Bash'],dmg:[20,28,24],pass:{tp:'blkC',v:0.2}},
  SLATTERN:{n:'Slattern',e:'🌊',i:'rim',c:4,r:0,t:'LI',hp:185,atk:['🔱 Tri-Tail Slam','📢 Category Scream','🌊 Tsunami'],dmg:[36,40,34],boss:true},
  SCUNNER:{n:'Scunner',e:'🐂',i:'rim',c:0,r:1,t:'PH',hp:100,atk:['🐂 Horn Gore','🏃 Bull Rush','💀 Skull Smash'],dmg:[24,22,20]},
  RAIJU:{n:'Raiju',e:'⚡',i:'rim',c:1,r:1,t:'LI',hp:90,atk:['⚡ Lightning Strike','🦅 Rapid Bite','🔵 Electric Surge'],dmg:[26,22,28]},
  MUTAVORE:{n:'Mutavore',e:'🦏',i:'rim',c:2,r:1,t:'PH',hp:110,atk:['💥 Wall Breach','🦅 Claw Rake','🔛 Charge'],dmg:[24,20,22]},
  ONIBABA:{n:'Onibaba',e:'🦀',i:'rim',c:3,r:1,t:'PH',hp:95,atk:['🦀 Pincer Attack','💥 Shell Cannon','🌪️ Sand Storm'],dmg:[22,20,24]},
  YAMARASHI:{n:'Yamarashi',e:'🦔',i:'rim',c:4,r:1,t:'PH',hp:100,atk:['🦔 Spine Barrage','🔄 Roll Tackle','💥 Quake Stomp'],dmg:[20,24,22]},
  MUTO:{n:'MUTO',e:'🕷️',i:'special',c:0,r:1,t:'FL',hp:75,atk:['⚡ EMP Pulse','🕷️ Wing Strike','🦅 Pincer Jab'],dmg:[16,18,20]},
  MUTO_PRIME:{n:'MUTO Prime',e:'🦂',i:'special',c:1,r:1,t:'PH',hp:145,atk:['🦂 Spine Spear','💥 Body Slam','🔊 Sonic Pulse'],dmg:[30,28,26],boss:true},
};
const HERO_KEYS=['GODZILLA','MOTHRA','MECHAG','JAEGER','OTACHI','KONG'];
const ALL_CATCH=Object.keys(MD).filter(k=>k!=='GODZILLA'&&!MD[k].bossOnly);
const ENEMY_POOL=ALL_CATCH.filter(k=>!MD[k].boss);
const BOSS_ORDER=['MUTO_PRIME','DESTOROYAH','SLATTERN','SPACEGZ','GHIDORAH'];
const ARENAS=[

function setLog(t){const l=$('log');if(l)l.textContent=t;}
function pickAtk(i){if(!gs.active||bLock)return;bLock=true;gs.pendAtk=i;showQ('battle');}
function animSpr(id,isAtk){const el=$(id);if(!el)return;el.classList.remove('shk','atkA');void el.offsetWidth;el.classList.add(isAtk?'atkA':'shk');setTimeout(()=>el&&el.classList.remove('shk','atkA'),500);}
function showFx(type,side){const arena=$('arena');if(!arena)return;const fx=document.createElement('div');fx.className=`fx fx-${side==='e'?'e'+type:type}`;arena.appendChild(fx);setTimeout(()=>fx.parentNode&&fx.remove(),720);if(type==='PH'){const a=$('arena');if(a){a.classList.remove('sshk');void a.offsetWidth;a.classList.add('sshk');setTimeout(()=>a&&a.classList.remove('sshk'),400);}}}
function heroAtks(){
  const hero=MD[gs.heroKey];let dmg=hero.dmg[gs.pendAtk]+gs.pass.atkB;
  if(gs.rage){dmg=Math.round(dmg*2);gs.rage=false;gs.rageStreak=0;}
  if(gs.powerUp){dmg=Math.round(dmg*1.5);gs.powerUp=false;}
  gs.enemyHp=Math.max(0,gs.enemyHp-dmg);if(gs.enemyHp<=0)gs.active=false;
  animSpr('hspr',true);setTimeout(()=>animSpr('espr',false),200);showFx(hero.t,'h');snd('hit');
  if(gs.pass.healC>0)gs.heroHp=Math.min(gs.heroHp+gs.pass.healC,gs.heroMaxHp);
  gs.stars+=Math.round(1*gs.pass.starsX);
  setTimeout(()=>{rBattle();if(gs.enemyHp<=0)setTimeout(winBattle,800);else{setTimeout(enemyAtks,900);bLock=false;}},600);
}
function enemyAtks(){
  if(!gs.active)return;const enemy=MD[gs.enemyKey];
  let dmg=Math.round(enemy.dmg[~~(Math.random()*3)]*(gs.isBoss?1.5:1))+~~(Math.random()*4)-Math.min(gs.pass.eRed,4);dmg=Math.max(1,dmg);
  if(gs.shield){gs.shield=false;setLog(`🛡️ Shield blocked ${enemy.n}!`);setTimeout(()=>{rBattle();bLock=false;},700);return;}
  if(Math.random()<gs.pass.blkC){setLog(`🛡️ Blocked!`);setTimeout(()=>{rBattle();bLock=false;},700);return;}
  gs.heroHp=Math.max(0,gs.heroHp-dmg);if(gs.heroHp<=0)gs.active=false;
  animSpr('espr',true);setTimeout(()=>animSpr('hspr',false),200);showFx(enemy.t,'e');snd('hit');
  setLog(`🔴 ${enemy.n} hits you! -${dmg} HP!`);
  setTimeout(()=>{rBattle();if(gs.heroHp<=0)setTimeout(loseBattle,800);else bLock=false;},600);
}
function counterAtk(){
  const enemy=MD[gs.enemyKey];const dmg=Math.max(4,Math.round(enemy.dmg[0]*0.28));
  gs.heroHp=Math.max(0,gs.heroHp-dmg);if(gs.heroHp<=0)gs.active=false;
  setLog(`❌ Wrong! ${enemy.n} taunts! -${dmg} HP (small hit)`);
  setTimeout(()=>{rBattle();if(gs.heroHp<=0)setTimeout(loseBattle,800);else bLock=false;},1000);
}
function winBattle(){
  gs.active=false;bLock=false;const iB=gs.isBoss;
  const earned=Math.round((iB?12:3)*gs.pass.starsX);gs.stars+=earned;gs.wins++;if(iB)gs.bossIdx++;
  saveG();snd('win');setLog((iB?'🏆 BOSS DEFEATED! ':'🎉 You win! ')+`+${earned} ⭐`);
  setTimeout(()=>{gs.isBoss=false;if(!iB&&gs.wins%5===0){gs.pendingBoss=true;show('heroSelect');}else rCatch();},1500);
}
function loseBattle(){gs.active=false;bLock=false;saveG();rGameOver();}
function exitBattle(){gs.active=false;bLock=false;gs.shield=false;gs.powerUp=false;gs.potionActive=false;gs.pendingBoss=false;show('title');}

function rBossChoice(){
  const bK=BOSS_ORDER[gs.bossIdx%BOSS_ORDER.length];snd('boss');
  $('app').innerHTML=`<div class="scr" style="background:radial-gradient(ellipse,#2a0010,#08081a)"><div style="font-size:26px;color:#e74c3c;animation:bob 1s infinite;margin-bottom:10px">💀 BOSS BATTLE!</div><div style="font-size:20px;margin-bottom:6px">Facing: ${MD[bK].e} ${MD[bK].n}</div><div style="font-size:17px;color:#aaa;margin-bottom:20px">Boss has ${MD[bK].hp*3} HP and hits hard!</div>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;width:100%;max-width:400px">
    <div class="pbox" style="cursor:pointer;border-color:#9b59b6;flex:1;min-width:150px;text-align:center" onclick="startBoss('EVOGZ')">${sprHtml('EVOGZ',100)}<div style="font-size:18px;color:#9b59b6;margin-top:6px">EVOLVED 💜</div><div style="font-size:15px;color:#aaa">HP: 200</div></div>
    <div class="pbox" style="cursor:pointer;border-color:#e74c3c;flex:1;min-width:150px;text-align:center" onclick="startBoss('BURNGZ')">${sprHtml('BURNGZ',100)}<div style="font-size:18px;color:#e74c3c;margin-top:6px">BURNING 🔥</div><div style="font-size:15px;color:#aaa">HP: 190</div></div>
  </div>
  <button class="btn gr" style="margin-top:16px;max-width:360px;font-size:16px" onclick="show('title')">SKIP FOR NOW</button></div>`;
}
function startBoss(fK){
  calcP();bLock=false;const form=MD[fK];gs.heroKey=fK;gs.heroHp=form.hp;gs.heroMaxHp=form.hp;
  gs.isBoss=true;gs.rageStreak=0;gs.rage=false;gs.active=true;gs.pendingBoss=false;
  const bK=BOSS_ORDER[gs.bossIdx%BOSS_ORDER.length];
  gs.enemyKey=bK;gs.enemyHp=MD[bK].hp*3;gs.enemyMaxHp=MD[bK].hp*3;
  gs.arenaIdx=(gs.arenaIdx+1)%ARENAS.length;rBattle();
}

function rCatch(){
  const k=gs.enemyKey;if(!k||!MD[k]){show('heroSelect');return;}
  const m=MD[k],already=gs.caught.includes(k);
  $('app').innerHTML=`<div class="scr" style="background:#08081a"><div style="font-size:26px;color:#f1c40f;margin-bottom:10px">⚡ WILD KAIJU!</div><div style="animation:bob 1s infinite;display:inline-block;margin:8px 0">${sprHtml(k,140)}</div><div style="font-size:26px;margin:12px 0">${m.e} ${m.n}</div><div style="font-size:18px;color:#888;margin-bottom:16px">${already?'Already in your team! Bonus stars!':m.n+' wants to join you!'}</div><button class="btn g" style="max-width:360px" onclick="attemptCatch()">⚡ CATCH IT!</button><button class="btn gr" style="max-width:360px;font-size:18px" onclick="afterCatch()">SKIP →</button></div>`;
}
function attemptCatch(){showQ('catch');}
function doCatch(){
  const k=gs.enemyKey,isNew=!gs.caught.includes(k);
  if(isNew){gs.caught.push(k);if(!gs.roster.includes(k))gs.roster.push(k);}
  const bonus=Math.round((isNew?5:2)*gs.pass.starsX);gs.stars+=bonus;saveG();snd('win');
  $('app').innerHTML=`<div class="scr" style="background:#08081a"><div style="font-size:60px;animation:bob 1s infinite">🎉</div><div style="font-size:26px;color:#27ae60;margin:12px 0">${MD[k].n} CAUGHT!</div><div style="display:inline-block">${sprHtml(k,120)}</div>${isNew?`<div style="font-size:18px;color:#aaa;margin-top:10px">Added to your team!</div>`:''}<div style="font-size:22px;color:#f1c40f;margin-top:10px">+${bonus} ⭐</div><button class="btn y" style="margin-top:16px;max-width:360px" onclick="afterCatch()">CONTINUE ▶</button></div>`;
}
function missedCatch(){$('app').innerHTML=`<div class="scr" style="background:#08081a"><div style="font-size:60px">💨</div><div style="font-size:22px;color:#e74c3c;margin:12px 0">${MD[gs.enemyKey]?.n||''} got away!</div><button class="btn y" style="margin-top:14px;max-width:360px" onclick="afterCatch()">CONTINUE ▶</button></div>`;}
function afterCatch(){show('heroSelect');}

function rGameOver(){
  const hero=MD[gs.heroKey];
  $('app').innerHTML=`<div class="scr" style="background:#0a0000"><div style="font-size:48px;color:#e74c3c;text-shadow:4px 4px 0 #000;margin-bottom:12px">💀 K.O.!</div><div style="opacity:.4;display:inline-block">${sprHtml(gs.heroKey,110)}</div><div style="font-size:20px;color:#aaa;margin:16px 0;line-height:2">${hero.n} was defeated!<br>⭐ ${gs.stars} Stars<br>🏆 ${gs.wins} Wins<br>Caught: ${gs.caught.length}/${ALL_CATCH.length}</div><button class="btn y" style="max-width:360px" onclick="show('heroSelect')">⚔️ TRY AGAIN!</button><button class="btn gr" style="max-width:360px" onclick="exitBattle()">🏠 MENU</button></div>`;
}

function rDex(){
  const cards=ALL_CATCH.map(k=>{const m=MD[k],got=gs.caught.includes(k),play=got&&gs.roster.includes(k);return`<div class="mcard ${got?(play?'play':'got'):'no'}"><div>${sprHtml(k,54)}</div><div class="mname">${got?m.n:'???'}</div></div>`;}).join('');
  $('app').innerHTML=`<div class="scr" style="background:#08081a;justify-content:flex-start;padding-top:14px;overflow-y:auto;max-height:100vh"><div style="font-size:26px;color:#f1c40f;margin-bottom:6px">📖 MONSTER DEX</div><div style="font-size:18px;color:#888;margin-bottom:6px">${gs.caught.length} / ${ALL_CATCH.length} CAUGHT</div><div style="font-size:14px;color:#888;margin-bottom:10px">🟡 = caught | 🟢 = playable</div><div class="dgrid">${cards}</div><button class="btn gr" style="margin-top:12px;margin-bottom:20px;max-width:360px" onclick="show('title')">← BACK</button></div>`;
}

// QUESTIONS
let qCtx=null,curQ=null;
const BADGES={M:'🔢 MATH',R:'📖 READ THE WORD',T:'🦖 KAIJU FACT',L:'🧩 THINK!',E:'💛 FEELINGS'};
function showQ(ctx){
  qCtx=ctx;const types=['M','R','T','L','E'],type=types[~~(Math.random()*types.length)];
  if(type==='M')curQ=mathQ();
  else if(type==='R')curQ=pQ(QR,'R');
  else if(type==='T')curQ=pQ(QT,'T');
  else if(type==='L')curQ=pQ(QL,'L');
  else curQ=pQ(QE,'E');
  const correctAns=curQ.opts[curQ.a];
  const sh=[...curQ.opts];
  for(let i=sh.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
  curQ={...curQ,opts:sh,a:sh.indexOf(correctAns)};
  $('qbadge').textContent=BADGES[type];
  $('qtxt').textContent=curQ.q;$('qfb').textContent='';
  const re=$('qremo');if(curQ.e){re.textContent=curQ.e;re.style.display='block';}else re.style.display='none';
  const oa=$('aopts');oa.innerHTML='';
  curQ.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='abtn';b.textContent=o;b.onclick=()=>ansQ(i,b,oa);oa.appendChild(b);});
  $('qmod').classList.add('on');
}
function ansQ(i,btn,oa){
  const ok=i===curQ.a;
  oa.querySelectorAll('.abtn').forEach(b=>b.disabled=true);
  btn.classList.add(ok?'ok':'no');if(!ok)oa.querySelectorAll('.abtn')[curQ.a].classList.add('ok');
  $('qfb').textContent=ok?'✅ CORRECT! Great job!':'❌ Not quite! The green one is right!';
  snd(ok?'ok':'no');
  if(ok){gs.rageStreak++;if(gs.rageStreak>=3){gs.rage=true;gs.rageStreak=0;}}else gs.rageStreak=0;
  setTimeout(()=>{$('qmod').classList.remove('on');if(qCtx==='battle'){ok?heroAtks():counterAtk();}else if(qCtx==='catch'){ok?doCatch():missedCatch();}},1600);
}
loadG();
</script>
</body>
</html>
